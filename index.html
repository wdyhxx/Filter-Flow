<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Filter Flow</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #000000;
            color: #e0e0e0;
            overflow-x: hidden;
        }
        
        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
        }
        
        header {
            text-align: center;
            margin-bottom: 30px;
            position: relative;
        }
        
        h1 {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 10px;
            color: #ffffff;
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.3);
            position: relative;
        }
        
        h1::after {
            content: '';
            position: absolute;
            bottom: -10px;
            left: 50%;
            transform: translateX(-50%);
            width: 80px;
            height: 2px;
            background: linear-gradient(90deg, transparent, #ffd700, transparent);
        }
        
        .nav {
            display: flex;
            justify-content: center;
            margin-bottom: 20px;
            background-color: rgba(255, 255, 255, 0.05);
            border-radius: 8px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
        }
        
        .nav-item {
            padding: 15px 20px;
            cursor: pointer;
            border-bottom: 2px solid transparent;
            transition: all 0.3s ease;
            position: relative;
        }
        
        .nav-item::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, rgba(255, 215, 0, 0.1), transparent);
            opacity: 0;
            transition: opacity 0.3s ease;
        }
        
        .nav-item:hover::before {
            opacity: 1;
        }
        
        .nav-item.active {
            border-bottom-color: #ffd700;
            color: #ffd700;
        }
        
        .page {
            display: none;
            background-color: rgba(255, 255, 255, 0.05);
            border-radius: 8px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
            padding: 20px;
            min-height: 400px;
            position: relative;
            overflow: hidden;
        }
        
        .page::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 2px;
            background: linear-gradient(90deg, transparent, #ffd700, transparent);
        }
        
        .page.active {
            display: block;
            animation: fadeIn 0.5s ease;
        }
        
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .add-btn {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background-color: #ffd700;
            color: #121212;
            border: none;
            font-size: 24px;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3), 0 0 20px rgba(255, 215, 0, 0.5);
            z-index: 1000;
            transition: all 0.3s ease;
        }
        
        .add-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 6px 8px rgba(0, 0, 0, 0.4), 0 0 30px rgba(255, 215, 0, 0.7);
        }
        
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(5px);
            z-index: 2000;
        }
        
        .modal.active {
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .modal-content {
            background-color: rgba(20, 20, 20, 0.95);
            border-radius: 8px;
            padding: 25px;
            width: 90%;
            max-width: 500px;
            border: 1px solid rgba(255, 215, 0, 0.2);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.5), 0 0 30px rgba(255, 215, 0, 0.2);
            position: relative;
        }
        
        .modal-content::before {
            content: '';
            position: absolute;
            top: -1px;
            left: -1px;
            right: -1px;
            height: 1px;
            background: linear-gradient(90deg, transparent, #ffd700, transparent);
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #e0e0e0;
        }
        
        input, select, textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 4px;
            font-size: 16px;
            background-color: rgba(255, 255, 255, 0.05);
            color: #e0e0e0;
            transition: all 0.3s ease;
        }
        
        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: #ffd700;
            box-shadow: 0 0 10px rgba(255, 215, 0, 0.3);
        }
        
        .button-group {
            display: flex;
            gap: 12px;
            margin-top: 25px;
        }
        
        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }
        
        .btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
            transition: left 0.5s ease;
        }
        
        .btn:hover::before {
            left: 100%;
        }
        
        .btn-primary {
            background-color: #ffd700;
            color: #121212;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
        }
        
        .btn-primary:hover {
            background-color: #ffed4e;
            box-shadow: 0 6px 8px rgba(0, 0, 0, 0.4), 0 0 20px rgba(255, 215, 0, 0.5);
        }
        
        .btn-secondary {
            background-color: rgba(255, 255, 255, 0.1);
            color: #e0e0e0;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        
        .btn-secondary:hover {
            background-color: rgba(255, 255, 255, 0.15);
            border-color: #ffd700;
        }
        
        .type-toggle, .mode-toggle {
            display: flex;
            gap: 12px;
            margin-bottom: 15px;
        }
        
        .type-btn, .mode-btn {
            padding: 10px 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 4px;
            background-color: rgba(255, 255, 255, 0.05);
            color: #e0e0e0;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
        }
        
        .type-btn:hover, .mode-btn:hover {
            background-color: rgba(255, 255, 255, 0.1);
        }
        
        .type-btn.active, .mode-btn.active {
            background-color: rgba(255, 215, 0, 0.2);
            color: #ffd700;
            border-color: #ffd700;
        }
        
        .tag-container {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 15px;
        }
        
        .tag-item {
            padding: 8px 16px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 18px;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s ease;
            background-color: rgba(255, 255, 255, 0.05);
            color: #e0e0e0;
        }
        
        .tag-item:hover {
            background-color: rgba(255, 255, 255, 0.1);
            transform: translateY(-2px);
        }
        
        .tag-item.selected {
            background-color: rgba(255, 215, 0, 0.2);
            color: #ffd700;
            border-color: #ffd700;
        }
        
        .transaction-list {
            margin-top: 20px;
        }
        
        .transaction-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }
        
        .transaction-item::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            height: 100%;
            width: 3px;
            background-color: transparent;
            transition: background-color 0.3s ease;
        }
        
        .transaction-item:hover {
            background-color: rgba(255, 255, 255, 0.05);
        }
        
        .transaction-item:hover::before {
            background-color: #ffd700;
        }
        
        .transaction-amount {
            font-weight: 600;
            font-size: 18px;
        }
        
        .expense {
            color: #f44336;
            text-shadow: 0 0 10px rgba(244, 67, 54, 0.3);
        }
        
        .income {
            color: #4caf50;
            text-shadow: 0 0 10px rgba(76, 175, 80, 0.3);
        }
        
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #999;
            font-size: 16px;
            position: relative;
        }
        
        .empty-state::before {
            content: '';
            position: absolute;
            top: 30%;
            left: 50%;
            transform: translateX(-50%);
            width: 100px;
            height: 100px;
            background: radial-gradient(circle, rgba(255, 215, 0, 0.1) 0%, transparent 70%);
            border-radius: 50%;
        }
        
        .stats-controls {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
            flex-wrap: wrap;
            padding: 15px;
            background-color: rgba(255, 255, 255, 0.03);
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        
        .chart-container {
            margin-bottom: 30px;
            position: relative;
            height: 300px;
            background-color: rgba(255, 255, 255, 0.03);
            border-radius: 8px;
            padding: 20px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        
        .stats-summary {
            display: flex;
            justify-content: space-around;
            margin-top: 20px;
            padding: 20px;
            background-color: rgba(255, 255, 255, 0.03);
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        
        .summary-item {
            text-align: center;
            position: relative;
            padding: 15px;
        }
        
        .summary-item::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 40px;
            height: 2px;
            background: linear-gradient(90deg, transparent, #ffd700, transparent);
        }
        
        .summary-label {
            font-size: 14px;
            color: #999;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .summary-value {
            font-size: 20px;
            font-weight: 700;
            color: #ffffff;
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.3);
        }
        
        .assets-controls {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        
        .total-assets {
            margin-bottom: 20px;
            padding: 20px;
            background-color: rgba(255, 255, 255, 0.03);
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            position: relative;
        }
        
        .total-assets::before {
            content: '';
            position: absolute;
            top: -1px;
            left: -1px;
            right: -1px;
            height: 1px;
            background: linear-gradient(90deg, transparent, #ffd700, transparent);
        }
        
        .account-list {
            margin-bottom: 30px;
        }
        
        .account-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .account-item:hover {
            background-color: rgba(255, 255, 255, 0.05);
        }
        
        .account-info {
            flex: 1;
        }
        
        .account-name {
            font-weight: 600;
            margin-bottom: 8px;
            color: #e0e0e0;
        }
        
        .account-balance {
            font-size: 18px;
            font-weight: 700;
            color: #ffffff;
            transition: all 0.3s ease;
        }
        
        .account-balance.hidden {
            font-size: 14px;
            color: #999;
            filter: blur(5px);
        }
        
        .account-balance.hidden:hover {
            filter: none;
        }
        
        .asset-actions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        
        .items-controls {
            margin-bottom: 20px;
            padding: 15px;
            background-color: rgba(255, 255, 255, 0.03);
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        
        .item-list {
            margin-top: 20px;
        }
        
        .item-item {
            padding: 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            margin-bottom: 15px;
            border-radius: 8px;
            background-color: rgba(255, 255, 255, 0.03);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }
        
        .item-item::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 2px;
            background: linear-gradient(90deg, transparent, #ffd700, transparent);
        }
        
        .item-item:hover {
            background-color: rgba(255, 255, 255, 0.05);
            transform: translateY(-2px);
        }
        
        .item-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }
        
        .item-name {
            font-weight: 600;
            font-size: 16px;
            color: #e0e0e0;
        }
        
        .item-status {
            padding: 6px 16px;
            border-radius: 16px;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .item-status.active {
            background-color: rgba(33, 150, 243, 0.2);
            color: #2196F3;
            border: 1px solid rgba(33, 150, 243, 0.3);
        }
        
        .item-status.finished {
            background-color: rgba(76, 175, 80, 0.2);
            color: #4CAF50;
            border: 1px solid rgba(76, 175, 80, 0.3);
        }
        
        .item-details {
            font-size: 14px;
            color: #999;
            margin-bottom: 15px;
        }
        
        .item-stats {
            display: flex;
            gap: 30px;
            font-size: 14px;
        }
        
        .item-stat {
            display: flex;
            flex-direction: column;
            flex: 1;
            padding: 10px;
            background-color: rgba(255, 255, 255, 0.03);
            border-radius: 4px;
            text-align: center;
        }
        
        .item-stat-label {
            color: #999;
            font-size: 12px;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .item-stat-value {
            font-weight: 700;
            color: #ffd700;
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.3);
        }
        
        .search-controls {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
            padding: 20px;
            background-color: rgba(255, 255, 255, 0.03);
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        
        .search-controls .form-group {
            display: flex;
            gap: 5px;
            align-items: end;
        }
        
        .search-controls input {
            width: 150px;
        }
        
        /* 滚动条样式 */
        ::-webkit-scrollbar {
            width: 8px;
        }
        
        ::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.05);
        }
        
        ::-webkit-scrollbar-thumb {
            background: rgba(255, 215, 0, 0.5);
            border-radius: 4px;
        }
        
        ::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 215, 0, 0.7);
        }
        
        @media (max-width: 600px) {
            .container {
                padding: 10px;
            }
            
            .nav-item {
                padding: 10px 15px;
                font-size: 14px;
            }
            
            .type-toggle, .mode-toggle {
                flex-direction: column;
            }
            
            .type-btn, .mode-btn {
                width: 100%;
            }
            
            .stats-controls {
                flex-direction: column;
            }
            
            .stats-summary {
                flex-direction: column;
                gap: 15px;
            }
            
            .chart-container {
                height: 250px;
            }
            
            .search-controls {
                flex-direction: column;
                align-items: stretch;
            }
            
            .search-controls input {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Filter Flow</h1>
        </header>
        
        <div class="nav">
            <div class="nav-item active" data-page="record">记录</div>
            <div class="nav-item" data-page="stats">统计</div>
            <div class="nav-item" data-page="assets">资产</div>
            <div class="nav-item" data-page="items">物品</div>
        </div>
        
        <div class="page active" id="record">
            <h2>记录交易</h2>
            <div class="search-controls">
                <div class="form-group">
                    <input type="text" id="search-keyword" placeholder="搜索备注...">
                </div>
                <div class="form-group">
                    <input type="number" id="search-min-amount" placeholder="最小金额">
                    <input type="number" id="search-max-amount" placeholder="最大金额">
                </div>
                <div class="form-group">
                    <input type="date" id="search-start-date">
                    <input type="date" id="search-end-date">
                </div>
                <div class="form-group">
                    <button class="btn btn-primary" id="search-btn">搜索</button>
                    <button class="btn btn-secondary" id="reset-search-btn">重置</button>
                </div>
            </div>
            <div class="transaction-list" id="transaction-list">
                <!-- 交易记录将在这里显示 -->
            </div>
        </div>
        
        <div class="page" id="stats">
            <h2>统计分析</h2>
            <div class="stats-controls">
                <div class="form-group">
                    <label>时间维度</label>
                    <select id="time-dimension">
                        <option value="week">每周</option>
                        <option value="month">每月</option>
                        <option value="year">每年</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>时间范围</label>
                    <input type="month" id="time-range">
                </div>
            </div>
            <div class="chart-container" id="expense-chart-container">
                <canvas id="expense-chart"></canvas>
            </div>
            <div class="chart-container" id="tag-chart-container">
                <canvas id="tag-chart"></canvas>
            </div>
            <div class="stats-summary">
                <div class="summary-item">
                    <div class="summary-label">总支出</div>
                    <div class="summary-value expense" id="total-expense">¥0.00</div>
                </div>
                <div class="summary-item">
                    <div class="summary-label">总收入</div>
                    <div class="summary-value income" id="total-income">¥0.00</div>
                </div>
                <div class="summary-item">
                    <div class="summary-label">盈余</div>
                    <div class="summary-value" id="total-balance">¥0.00</div>
                </div>
            </div>
        </div>
        
        <div class="page" id="assets">
            <h2>资产管理</h2>
            <div class="assets-controls">
                <button class="btn btn-primary" id="add-account-btn">添加账户</button>
                <button class="btn btn-secondary" id="toggle-visibility-btn">显示/隐藏金额</button>
            </div>
            <div class="total-assets">
                <h3>总资产: <span id="total-assets-amount">¥0.00</span></h3>
            </div>
            <div class="account-list" id="account-list">
                <!-- 账户列表将在这里显示 -->
            </div>
            <div class="asset-actions">
                <button class="btn btn-primary" id="transfer-btn">转账</button>
                <button class="btn btn-secondary" id="adjust-btn">调整资产</button>
                <button class="btn btn-secondary" id="asset-history-btn">资产历史</button>
            </div>
        </div>
        
        <div class="page" id="items">
            <h2>物品追踪</h2>
            <div class="items-controls">
                <button class="btn btn-primary" id="add-item-btn">添加物品</button>
            </div>
            <div class="item-list" id="item-list">
                <!-- 物品列表将在这里显示 -->
            </div>
        </div>
        
        <button class="add-btn" id="add-btn">+</button>
    </div>
    
    <div class="modal" id="transaction-modal">
        <div class="modal-content">
            <h3>添加交易</h3>
            <div class="form-group">
                <label>类型</label>
                <div class="type-toggle">
                    <button type="button" class="type-btn active" data-type="expense">支出</button>
                    <button type="button" class="type-btn" data-type="income">收入</button>
                </div>
                <input type="hidden" id="transaction-type" value="expense">
            </div>
            <div class="form-group">
                <label>金额</label>
                <input type="number" id="transaction-amount" step="0.01" min="0" required>
            </div>
            <div class="form-group">
                <label>日期</label>
                <input type="date" id="transaction-date" required>
            </div>
            <div class="form-group">
                <label>账户</label>
                <select id="transaction-account">
                    <!-- 账户选项将在这里动态添加 -->
                </select>
            </div>
            <div class="form-group">
                <label>标签</label>
                <div class="tag-container" id="tag-container">
                    <!-- 标签选项将在这里动态添加 -->
                </div>
                <input type="hidden" id="transaction-tags">
            </div>
            <div class="form-group">
                <label>备注</label>
                <textarea id="transaction-note" rows="2"></textarea>
            </div>
            <div class="form-group">
                <label>输入模式</label>
                <div class="mode-toggle">
                    <button type="button" class="mode-btn active" data-mode="quick">快速模式</button>
                    <button type="button" class="mode-btn" data-mode="batch">批量模式</button>
                </div>
                <input type="hidden" id="input-mode" value="quick">
            </div>
            <div class="button-group">
                <button type="button" class="btn btn-secondary" id="cancel-btn">取消</button>
                <button type="submit" class="btn btn-primary">保存</button>
            </div>
        </div>
    </div>
    
    <script>
        // 数据模型
        class Transaction {
            constructor(id, type, amount, date, account_id, tags, note, related_id = null) {
                this.id = id;
                this.type = type;
                this.amount = amount;
                this.date = date;
                this.account_id = account_id;
                this.tags = tags;
                this.note = note;
                this.related_id = related_id;
                this.created_at = new Date().toISOString();
                this.updated_at = new Date().toISOString();
            }
        }
        
        class Account {
            constructor(id, name, initial_balance, is_hidden = false) {
                this.id = id;
                this.name = name;
                this.initial_balance = initial_balance;
                this.is_hidden = is_hidden;
            }
        }
        
        class Tag {
            constructor(id, name, color, emoji = '') {
                this.id = id;
                this.name = name;
                this.color = color;
                this.emoji = emoji;
            }
        }
        
        class Item {
            constructor(id, name, transaction_id, start_date, end_date, status = 'active') {
                this.id = id;
                this.name = name;
                this.transaction_id = transaction_id;
                this.start_date = start_date;
                this.end_date = end_date;
                this.status = status;
            }
        }
        
        class MonthlyGoal {
            constructor(month, target_amount) {
                this.month = month;
                this.target_amount = target_amount;
            }
        }
        
        // 数据存储
        class Storage {
            static getTransactions() {
                const transactions = localStorage.getItem('transactions');
                return transactions ? JSON.parse(transactions) : [];
            }
            
            static saveTransaction(transaction) {
                const transactions = this.getTransactions();
                transactions.push(transaction);
                localStorage.setItem('transactions', JSON.stringify(transactions));
            }
            
            static getAccounts() {
                const accounts = localStorage.getItem('accounts');
                return accounts ? JSON.parse(accounts) : [
                    new Account('1', '现金', 0),
                    new Account('2', '银行卡', 0)
                ];
            }
            
            static saveAccount(account) {
                const accounts = this.getAccounts();
                accounts.push(account);
                localStorage.setItem('accounts', JSON.stringify(accounts));
            }
            
            static getTags() {
                const tags = localStorage.getItem('tags');
                return tags ? JSON.parse(tags) : [
                    new Tag('1', '餐饮', '#FF5722', '🍔'),
                    new Tag('2', '交通', '#2196F3', '🚗'),
                    new Tag('3', '购物', '#9C27B0', '🛍️'),
                    new Tag('4', '娱乐', '#FFC107', '🎮'),
                    new Tag('5', '工资', '#4CAF50', '💰')
                ];
            }
            
            static saveTag(tag) {
                const tags = this.getTags();
                tags.push(tag);
                localStorage.setItem('tags', JSON.stringify(tags));
            }
            
            static getItems() {
                const items = localStorage.getItem('items');
                return items ? JSON.parse(items) : [];
            }
            
            static saveItem(item) {
                const items = this.getItems();
                items.push(item);
                localStorage.setItem('items', JSON.stringify(items));
            }
            
            static getMonthlyGoals() {
                const goals = localStorage.getItem('monthlyGoals');
                return goals ? JSON.parse(goals) : [];
            }
            
            static saveMonthlyGoal(goal) {
                const goals = this.getMonthlyGoals();
                goals.push(goal);
                localStorage.setItem('monthlyGoals', JSON.stringify(goals));
            }
        }
        
        // 应用逻辑
        class App {
            constructor() {
                this.init();
                this.selectedTags = [];
                this.expenseChart = null;
                this.tagChart = null;
                // 缓存DOM元素
                this.elements = {
                    transactionModal: document.getElementById('transaction-modal'),
                    transactionAmount: document.getElementById('transaction-amount'),
                    transactionDate: document.getElementById('transaction-date'),
                    transactionType: document.getElementById('transaction-type'),
                    transactionAccount: document.getElementById('transaction-account'),
                    transactionTags: document.getElementById('transaction-tags'),
                    transactionNote: document.getElementById('transaction-note'),
                    inputMode: document.getElementById('input-mode'),
                    transactionList: document.getElementById('transaction-list'),
                    timeDimension: document.getElementById('time-dimension'),
                    timeRange: document.getElementById('time-range'),
                    searchKeyword: document.getElementById('search-keyword'),
                    searchMinAmount: document.getElementById('search-min-amount'),
                    searchMaxAmount: document.getElementById('search-max-amount'),
                    searchStartDate: document.getElementById('search-start-date'),
                    searchEndDate: document.getElementById('search-end-date'),
                    accountList: document.getElementById('account-list'),
                    totalAssetsAmount: document.getElementById('total-assets-amount'),
                    itemList: document.getElementById('item-list')
                };
            }
            
            init() {
                this.bindEvents();
                this.renderAccounts();
                this.renderTags();
                this.renderTransactions();
                this.setDefaultDate();
                this.setDefaultTimeRange();
            }
            
            bindEvents() {
                // 导航切换
                document.querySelectorAll('.nav-item').forEach(item => {
                    item.addEventListener('click', (e) => {
                        const page = e.target.dataset.page;
                        this.switchPage(page);
                    });
                });
                
                // 添加按钮
                document.getElementById('add-btn').addEventListener('click', () => {
                    this.showModal();
                });
                
                // 取消按钮
                document.getElementById('cancel-btn').addEventListener('click', () => {
                    this.hideModal();
                });
                
                // 表单提交
                document.getElementById('transaction-form').addEventListener('submit', (e) => {
                    e.preventDefault();
                    this.saveTransaction();
                });
                
                // 类型切换
                document.querySelectorAll('.type-btn').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        document.querySelectorAll('.type-btn').forEach(b => b.classList.remove('active'));
                        e.target.classList.add('active');
                        document.getElementById('transaction-type').value = e.target.dataset.type;
                    });
                });
                
                // 模式切换
                document.querySelectorAll('.mode-btn').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
                        e.target.classList.add('active');
                        document.getElementById('input-mode').value = e.target.dataset.mode;
                    });
                });
                
                // 标签选择
                document.getElementById('tag-container').addEventListener('click', (e) => {
                    if (e.target.classList.contains('tag-item')) {
                        e.target.classList.toggle('selected');
                        this.updateSelectedTags();
                    }
                });
                
                // 统计页面事件
                document.getElementById('time-dimension').addEventListener('change', () => {
                    this.renderStats();
                });
                
                document.getElementById('time-range').addEventListener('change', () => {
                    this.renderStats();
                });
                
                // 搜索事件
                document.getElementById('search-btn').addEventListener('click', () => {
                    this.searchTransactions();
                });
                
                document.getElementById('reset-search-btn').addEventListener('click', () => {
                    this.resetSearch();
                });
            }
            
            switchPage(page) {
                // 隐藏所有页面
                document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
                document.querySelectorAll('.nav-item').forEach(item => item.classList.remove('active'));
                
                // 显示选中页面
                document.getElementById(page).classList.add('active');
                document.querySelector(`[data-page="${page}"]`).classList.add('active');
                
                // 如果切换到统计页面，渲染统计数据
                if (page === 'stats') {
                    this.renderStats();
                }
                // 如果切换到资产页面，渲染资产数据
                if (page === 'assets') {
                    this.renderAssets();
                }
                // 如果切换到物品页面，渲染物品数据
                if (page === 'items') {
                    this.renderItems();
                }
            }
            
            setDefaultTimeRange() {
                const today = new Date();
                const year = today.getFullYear();
                const month = String(today.getMonth() + 1).padStart(2, '0');
                document.getElementById('time-range').value = `${year}-${month}`;
            }
            
            showModal() {
                this.elements.transactionModal.classList.add('active');
                this.elements.transactionAmount.focus();
            }
            
            hideModal() {
                this.elements.transactionModal.classList.remove('active');
                document.getElementById('transaction-form').reset();
                this.setDefaultDate();
                this.selectedTags = [];
                this.renderTags();
            }
            
            setDefaultDate() {
                const today = new Date().toISOString().split('T')[0];
                this.elements.transactionDate.value = today;
            }
            
            renderAccounts() {
                const accounts = Storage.getAccounts();
                const select = this.elements.transactionAccount;
                select.innerHTML = '';
                
                accounts.forEach(account => {
                    const option = document.createElement('option');
                    option.value = account.id;
                    option.textContent = account.name;
                    select.appendChild(option);
                });
            }
            
            renderTags() {
                const tags = Storage.getTags();
                const container = document.getElementById('tag-container');
                container.innerHTML = '';
                
                tags.forEach(tag => {
                    const tagItem = document.createElement('div');
                    tagItem.className = `tag-item ${this.selectedTags.includes(tag.id) ? 'selected' : ''}`;
                    tagItem.dataset.tagId = tag.id;
                    tagItem.style.borderColor = tag.color;
                    tagItem.innerHTML = `${tag.emoji} ${tag.name}`;
                    container.appendChild(tagItem);
                });
            }
            
            updateSelectedTags() {
                this.selectedTags = [];
                document.querySelectorAll('.tag-item.selected').forEach(item => {
                    this.selectedTags.push(item.dataset.tagId);
                });
                this.elements.transactionTags.value = this.selectedTags.join(',');
            }
            
            saveTransaction() {
                const type = this.elements.transactionType.value;
                const amount = parseFloat(this.elements.transactionAmount.value);
                const date = this.elements.transactionDate.value;
                const account_id = this.elements.transactionAccount.value;
                const tags = this.elements.transactionTags.value.split(',').filter(tag => tag);
                const note = this.elements.transactionNote.value;
                const mode = this.elements.inputMode.value;
                
                const id = Date.now().toString();
                const transaction = new Transaction(id, type, amount, date, account_id, tags, note);
                
                Storage.saveTransaction(transaction);
                this.renderTransactions();
                
                if (mode === 'quick') {
                    this.hideModal();
                } else {
                    // 批量模式：清空金额和备注，保持其他字段不变
                    this.elements.transactionAmount.value = '';
                    this.elements.transactionNote.value = '';
                    this.elements.transactionAmount.focus();
                }
            }
            
            renderTransactions() {
                const transactions = Storage.getTransactions();
                const list = this.elements.transactionList;
                
                if (transactions.length === 0) {
                    list.innerHTML = '<div class="empty-state">用户消费系统等待接入</div>';
                    return;
                }
                
                list.innerHTML = '';
                
                transactions.sort((a, b) => new Date(b.date) - new Date(a.date)).forEach(transaction => {
                    const item = document.createElement('div');
                    item.className = 'transaction-item';
                    
                    const typeClass = transaction.type === 'income' ? 'income' : 'expense';
                    
                    item.innerHTML = `
                        <div>
                            <div>${transaction.type === 'expense' ? '支出' : transaction.type === 'income' ? '收入' : transaction.type === 'transfer' ? '转账' : transaction.type === 'refund' ? '退款' : '调整'}</div>
                            <div style="font-size: 14px; color: #666;">${transaction.date}</div>
                            <div style="font-size: 14px; color: #999;">${transaction.note || '无备注'}</div>
                        </div>
                        <div class="transaction-amount ${typeClass}">¥${transaction.amount.toFixed(2)}</div>
                    `;
                    
                    // 添加点击编辑功能
                    item.addEventListener('click', () => {
                        this.editTransaction(transaction);
                    });
                    
                    list.appendChild(item);
                });
            }
            
            editTransaction(transaction) {
                // 填充表单数据
                this.elements.transactionType.value = transaction.type;
                this.elements.transactionAmount.value = transaction.amount;
                this.elements.transactionDate.value = transaction.date;
                this.elements.transactionAccount.value = transaction.account_id;
                this.elements.transactionTags.value = transaction.tags.join(',');
                this.elements.transactionNote.value = transaction.note;
                
                // 更新类型按钮状态
                document.querySelectorAll('.type-btn').forEach(btn => {
                    btn.classList.remove('active');
                    if (btn.dataset.type === transaction.type) {
                        btn.classList.add('active');
                    }
                });
                
                // 更新标签选择
                this.selectedTags = transaction.tags;
                this.renderTags();
                
                // 显示模态框
                this.showModal();
            }
            
            renderStats() {
                const stats = this.calculateStats();
                this.updateSummary(stats);
                this.renderExpenseChart(stats);
                this.renderTagChart(stats);
            }
            
            calculateStats() {
                const transactions = Storage.getTransactions();
                const timeRange = document.getElementById('time-range').value;
                const [year, month] = timeRange.split('-');
                
                let filteredTransactions = transactions.filter(t => {
                    const tDate = new Date(t.date);
                    return tDate.getFullYear() === parseInt(year) && tDate.getMonth() + 1 === parseInt(month);
                });
                
                let totalExpense = 0;
                let totalIncome = 0;
                const tagExpenses = {};
                
                filteredTransactions.forEach(t => {
                    if (t.type === 'expense') {
                        totalExpense += t.amount;
                        t.tags.forEach(tagId => {
                            if (!tagExpenses[tagId]) {
                                tagExpenses[tagId] = 0;
                            }
                            tagExpenses[tagId] += t.amount;
                        });
                    } else if (t.type === 'income') {
                        totalIncome += t.amount;
                    }
                });
                
                return {
                    totalExpense,
                    totalIncome,
                    balance: totalIncome - totalExpense,
                    tagExpenses,
                    transactions: filteredTransactions
                };
            }
            
            renderStats() {
                const stats = this.calculateStats();
                this.updateSummary(stats);
                
                // 重置图表容器
                document.getElementById('expense-chart-container').innerHTML = '<canvas id="expense-chart"></canvas>';
                document.getElementById('tag-chart-container').innerHTML = '<canvas id="tag-chart"></canvas>';
                
                if (stats.transactions.length > 0) {
                    this.renderExpenseChart(stats);
                    this.renderTagChart(stats);
                } else {
                    document.getElementById('expense-chart').parentElement.innerHTML = '<div class="empty-state">当前周期无有效数据</div>';
                    document.getElementById('tag-chart').parentElement.innerHTML = '<div class="empty-state">当前周期无有效数据</div>';
                }
            }
            
            updateSummary(stats) {
                document.getElementById('total-expense').textContent = `¥${stats.totalExpense.toFixed(2)}`;
                document.getElementById('total-income').textContent = `¥${stats.totalIncome.toFixed(2)}`;
                document.getElementById('total-balance').textContent = `¥${stats.balance.toFixed(2)}`;
                document.getElementById('total-balance').className = `summary-value ${stats.balance >= 0 ? 'income' : 'expense'}`;
            }
            
            renderExpenseChart(stats) {
                const ctx = document.getElementById('expense-chart').getContext('2d');
                
                if (this.expenseChart) {
                    this.expenseChart.destroy();
                }
                
                this.expenseChart = new Chart(ctx, {
                    type: 'bar',
                    data: {
                        labels: ['支出', '收入', '盈余'],
                        datasets: [{
                            label: '金额',
                            data: [stats.totalExpense, stats.totalIncome, stats.balance],
                            backgroundColor: [
                                'rgba(244, 67, 54, 0.8)',
                                'rgba(76, 175, 80, 0.8)',
                                stats.balance >= 0 ? 'rgba(76, 175, 80, 0.8)' : 'rgba(244, 67, 54, 0.8)'
                            ],
                            borderColor: [
                                'rgba(244, 67, 54, 1)',
                                'rgba(76, 175, 80, 1)',
                                stats.balance >= 0 ? 'rgba(76, 175, 80, 1)' : 'rgba(244, 67, 54, 1)'
                            ],
                            borderWidth: 2,
                            borderSkipped: false
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        scales: {
                            y: {
                                beginAtZero: true,
                                grid: {
                                    color: 'rgba(255, 255, 255, 0.1)'
                                },
                                ticks: {
                                    color: '#e0e0e0',
                                    callback: function(value) {
                                        return '¥' + value;
                                    }
                                }
                            },
                            x: {
                                grid: {
                                    color: 'rgba(255, 255, 255, 0.1)'
                                },
                                ticks: {
                                    color: '#e0e0e0'
                                }
                            }
                        },
                        plugins: {
                            legend: {
                                display: false
                            },
                            tooltip: {
                                backgroundColor: 'rgba(20, 20, 20, 0.9)',
                                titleColor: '#ffd700',
                                bodyColor: '#e0e0e0',
                                borderColor: 'rgba(255, 215, 0, 0.3)',
                                borderWidth: 1,
                                callbacks: {
                                    label: function(context) {
                                        return '¥' + context.parsed.y.toFixed(2);
                                    }
                                }
                            }
                        }
                    }
                });
            }
            
            renderTagChart(stats) {
                const ctx = document.getElementById('tag-chart').getContext('2d');
                const tags = Storage.getTags();
                const tagMap = {};
                tags.forEach(tag => {
                    tagMap[tag.id] = tag;
                });
                
                const labelData = [];
                const valueData = [];
                const colorData = [];
                
                Object.entries(stats.tagExpenses).forEach(([tagId, amount]) => {
                    const tag = tagMap[tagId];
                    if (tag) {
                        labelData.push(tag.name);
                        valueData.push(amount);
                        colorData.push(tag.color);
                    }
                });
                
                if (this.tagChart) {
                    this.tagChart.destroy();
                }
                
                this.tagChart = new Chart(ctx, {
                    type: 'pie',
                    data: {
                        labels: labelData,
                        datasets: [{
                            data: valueData,
                            backgroundColor: colorData.map(color => color + '80'), // 添加透明度
                            borderColor: 'rgba(20, 20, 20, 0.8)',
                            borderWidth: 2
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: {
                            legend: {
                                position: 'bottom',
                                labels: {
                                    color: '#e0e0e0',
                                    padding: 20,
                                    usePointStyle: true,
                                    pointStyle: 'circle'
                                }
                            },
                            tooltip: {
                                backgroundColor: 'rgba(20, 20, 20, 0.9)',
                                titleColor: '#ffd700',
                                bodyColor: '#e0e0e0',
                                borderColor: 'rgba(255, 215, 0, 0.3)',
                                borderWidth: 1,
                                callbacks: {
                                    label: function(context) {
                                        const value = context.parsed;
                                        const total = context.dataset.data.reduce((a, b) => a + b, 0);
                                        const percentage = ((value / total) * 100).toFixed(1);
                                        return `¥${value.toFixed(2)} (${percentage}%)`;
                                    }
                                }
                            }
                        }
                    }
                });
            }
            
            renderAssets() {
                this.calculateAccountBalances();
                this.bindAssetEvents();
            }
            
            calculateAccountBalances() {
                const accounts = Storage.getAccounts();
                const transactions = Storage.getTransactions();
                const accountList = this.elements.accountList;
                const totalAssetsElement = this.elements.totalAssetsAmount;
                
                let totalAssets = 0;
                accountList.innerHTML = '';
                
                accounts.forEach(account => {
                    let balance = account.initial_balance;
                    
                    transactions.forEach(transaction => {
                        if (transaction.account_id === account.id) {
                            if (transaction.type === 'income') {
                                balance += transaction.amount;
                            } else if (transaction.type === 'expense') {
                                balance -= transaction.amount;
                            } else if (transaction.type === 'transfer') {
                                // 转账需要特殊处理，这里简化处理
                            }
                        }
                    });
                    
                    totalAssets += balance;
                    
                    const accountItem = document.createElement('div');
                    accountItem.className = 'account-item';
                    
                    accountItem.innerHTML = `
                        <div class="account-info">
                            <div class="account-name">${account.name}</div>
                            <div class="account-balance ${account.is_hidden ? 'hidden' : ''}">
                                ${account.is_hidden ? '****' : `¥${balance.toFixed(2)}`}
                            </div>
                        </div>
                        <button class="btn btn-secondary edit-account-btn" data-account-id="${account.id}">编辑</button>
                    `;
                    
                    accountList.appendChild(accountItem);
                });
                
                totalAssetsElement.textContent = `¥${totalAssets.toFixed(2)}`;
            }
            
            bindAssetEvents() {
                // 添加账户按钮
                document.getElementById('add-account-btn').addEventListener('click', () => {
                    this.addAccount();
                });
                
                // 显示/隐藏金额按钮
                document.getElementById('toggle-visibility-btn').addEventListener('click', () => {
                    this.toggleVisibility();
                });
                
                // 转账按钮
                document.getElementById('transfer-btn').addEventListener('click', () => {
                    this.showTransferModal();
                });
                
                // 调整资产按钮
                document.getElementById('adjust-btn').addEventListener('click', () => {
                    this.showAdjustModal();
                });
                
                // 资产历史按钮
                document.getElementById('asset-history-btn').addEventListener('click', () => {
                    this.showAssetHistory();
                });
                
                // 编辑账户按钮
                document.querySelectorAll('.edit-account-btn').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        const accountId = e.target.dataset.accountId;
                        this.editAccount(accountId);
                    });
                });
            }
            
            addAccount() {
                const name = prompt('请输入账户名称:');
                const initialBalance = parseFloat(prompt('请输入初始金额:')) || 0;
                
                if (name) {
                    const id = Date.now().toString();
                    const account = new Account(id, name, initialBalance);
                    Storage.saveAccount(account);
                    this.calculateAccountBalances();
                }
            }
            
            toggleVisibility() {
                const accounts = Storage.getAccounts();
                const updatedAccounts = accounts.map(account => ({
                    ...account,
                    is_hidden: !account.is_hidden
                }));
                localStorage.setItem('accounts', JSON.stringify(updatedAccounts));
                this.calculateAccountBalances();
            }
            
            showTransferModal() {
                const accounts = Storage.getAccounts();
                let fromAccount = prompt('请输入转出账户名称:');
                let toAccount = prompt('请输入转入账户名称:');
                let amount = parseFloat(prompt('请输入转账金额:'));
                
                if (fromAccount && toAccount && amount) {
                    // 简化处理，实际应该根据账户名称查找ID
                    this.transferFunds(fromAccount, toAccount, amount);
                }
            }
            
            transferFunds(fromAccount, toAccount, amount) {
                // 简化实现，实际应该创建两条转账记录
                alert(`从 ${fromAccount} 转账 ¥${amount.toFixed(2)} 到 ${toAccount}`);
                this.calculateAccountBalances();
            }
            
            showAdjustModal() {
                const account = prompt('请输入要调整的账户名称:');
                const amount = parseFloat(prompt('请输入调整金额（正数增加，负数减少）:'));
                
                if (account && amount) {
                    // 简化处理，实际应该创建调整记录
                    alert(`调整 ${account} 金额: ¥${amount.toFixed(2)}`);
                    this.calculateAccountBalances();
                }
            }
            
            showAssetHistory() {
                alert('资产历史功能开发中...');
            }
            
            editAccount(accountId) {
                const accounts = Storage.getAccounts();
                const account = accounts.find(a => a.id === accountId);
                
                if (account) {
                    const name = prompt('请输入新的账户名称:', account.name);
                    const initialBalance = parseFloat(prompt('请输入新的初始金额:', account.initial_balance));
                    
                    if (name) {
                        account.name = name;
                        account.initial_balance = initialBalance || 0;
                        localStorage.setItem('accounts', JSON.stringify(accounts));
                        this.calculateAccountBalances();
                    }
                }
            }
            
            renderItems() {
                this.calculateItemStats();
                this.bindItemEvents();
            }
            
            calculateItemStats() {
                const items = Storage.getItems();
                const transactions = Storage.getTransactions();
                const itemList = this.elements.itemList;
                
                itemList.innerHTML = '';
                
                if (items.length === 0) {
                    itemList.innerHTML = '<div class="empty-state">暂无物品记录</div>';
                    return;
                }
                
                items.forEach(item => {
                    const transaction = transactions.find(t => t.id === item.transaction_id);
                    const stats = this.calculateItemDays(item);
                    
                    const itemElement = document.createElement('div');
                    itemElement.className = 'item-item';
                    
                    itemElement.innerHTML = `
                        <div class="item-header">
                            <div class="item-name">${item.name}</div>
                            <div class="item-status ${item.status}">${item.status === 'active' ? '使用中' : '已结束'}</div>
                        </div>
                        <div class="item-details">
                            ${transaction ? `关联消费: ¥${transaction.amount.toFixed(2)} (${transaction.date})` : '无关联消费'}
                        </div>
                        <div class="item-stats">
                            <div class="item-stat">
                                <div class="item-stat-label">使用天数</div>
                                <div class="item-stat-value">${stats.usedDays}</div>
                            </div>
                            <div class="item-stat">
                                <div class="item-stat-label">日均成本</div>
                                <div class="item-stat-value">¥${stats.dailyCost.toFixed(2)}</div>
                            </div>
                        </div>
                        <div class="button-group" style="margin-top: 10px;">
                            <button class="btn btn-secondary toggle-status-btn" data-item-id="${item.id}">切换状态</button>
                        </div>
                    `;
                    
                    itemList.appendChild(itemElement);
                });
            }
            
            calculateItemDays(item) {
                const startDate = new Date(item.start_date);
                const endDate = item.status === 'finished' ? new Date(item.end_date) : new Date();
                const diffTime = Math.abs(endDate - startDate);
                const usedDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24)) + 1; // 包含开始和结束日期
                
                // 获取关联交易的金额
                const transactions = Storage.getTransactions();
                const transaction = transactions.find(t => t.id === item.transaction_id);
                const amount = transaction ? transaction.amount : 0;
                
                const dailyCost = usedDays > 0 ? amount / usedDays : 0;
                
                return { usedDays, dailyCost };
            }
            
            bindItemEvents() {
                // 添加物品按钮
                document.getElementById('add-item-btn').addEventListener('click', () => {
                    this.addItem();
                });
                
                // 切换物品状态按钮
                document.querySelectorAll('.toggle-status-btn').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        const itemId = e.target.dataset.itemId;
                        this.toggleItemStatus(itemId);
                    });
                });
            }
            
            addItem() {
                const name = prompt('请输入物品名称:');
                const transactionId = prompt('请输入关联交易ID:');
                const startDate = prompt('请输入开始日期 (YYYY-MM-DD):', new Date().toISOString().split('T')[0]);
                const endDate = prompt('请输入结束日期 (YYYY-MM-DD):');
                
                if (name && startDate) {
                    const id = Date.now().toString();
                    const item = new Item(id, name, transactionId, startDate, endDate);
                    Storage.saveItem(item);
                    this.calculateItemStats();
                }
            }
            
            toggleItemStatus(itemId) {
                const items = Storage.getItems();
                const item = items.find(i => i.id === itemId);
                
                if (item) {
                    item.status = item.status === 'active' ? 'finished' : 'active';
                    if (item.status === 'finished' && !item.end_date) {
                        item.end_date = new Date().toISOString().split('T')[0];
                    }
                    localStorage.setItem('items', JSON.stringify(items));
                    this.calculateItemStats();
                }
            }
            
            searchTransactions() {
                const keyword = this.elements.searchKeyword.value;
                const minAmount = parseFloat(this.elements.searchMinAmount.value) || 0;
                const maxAmount = parseFloat(this.elements.searchMaxAmount.value) || Infinity;
                const startDate = this.elements.searchStartDate.value;
                const endDate = this.elements.searchEndDate.value;
                
                const transactions = Storage.getTransactions();
                const filteredTransactions = transactions.filter(t => {
                    // 关键词搜索
                    const matchesKeyword = !keyword || t.note.toLowerCase().includes(keyword.toLowerCase());
                    // 金额范围
                    const matchesAmount = t.amount >= minAmount && t.amount <= maxAmount;
                    // 日期范围
                    const matchesDate = (!startDate || t.date >= startDate) && (!endDate || t.date <= endDate);
                    
                    return matchesKeyword && matchesAmount && matchesDate;
                });
                
                this.renderFilteredTransactions(filteredTransactions);
            }
            
            resetSearch() {
                this.elements.searchKeyword.value = '';
                this.elements.searchMinAmount.value = '';
                this.elements.searchMaxAmount.value = '';
                this.elements.searchStartDate.value = '';
                this.elements.searchEndDate.value = '';
                this.renderTransactions();
            }
            
            renderFilteredTransactions(transactions) {
                const list = this.elements.transactionList;
                
                if (transactions.length === 0) {
                    list.innerHTML = '<div class="empty-state">未检索到匹配记录</div>';
                    return;
                }
                
                list.innerHTML = '';
                
                transactions.sort((a, b) => new Date(b.date) - new Date(a.date)).forEach(transaction => {
                    const item = document.createElement('div');
                    item.className = 'transaction-item';
                    
                    const typeClass = transaction.type === 'income' ? 'income' : 'expense';
                    
                    item.innerHTML = `
                        <div>
                            <div>${transaction.type === 'expense' ? '支出' : transaction.type === 'income' ? '收入' : transaction.type === 'transfer' ? '转账' : transaction.type === 'refund' ? '退款' : '调整'}</div>
                            <div style="font-size: 14px; color: #666;">${transaction.date}</div>
                            <div style="font-size: 14px; color: #999;">${transaction.note || '无备注'}</div>
                        </div>
                        <div class="transaction-amount ${typeClass}">¥${transaction.amount.toFixed(2)}</div>
                    `;
                    
                    // 添加点击编辑功能
                    item.addEventListener('click', () => {
                        this.editTransaction(transaction);
                    });
                    
                    list.appendChild(item);
                });
            }
        }
        
        // 初始化应用
        new App();
    </script>
</body>
</html>
